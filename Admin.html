<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Kelola Soal & Email</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: white; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: #16213e; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #aaa; font-size: 13px; margin-bottom: 20px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; background: #0f3460; border-radius: 12px; padding: 5px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; color: #aaa; }
        .tab.active { background: #e94560; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #333; border-radius: 10px; font-size: 14px; background: #1a1a2e; color: white; }
        button { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 3px; font-size: 14px; transition: all 0.2s; }
        .btn-red { background: #e94560; color: white; }
        .btn-blue { background: #0f3460; color: white; }
        .btn-green { background: #00b894; color: white; }
        .btn-outline { background: transparent; border: 2px solid #e94560; color: #e94560; }
        .card { background: #0f3460; padding: 15px; border-radius: 12px; margin: 10px 0; }
        .email-item { display: flex; justify-content: space-between; align-items: center; background: #1a1a4e; padding: 12px 15px; border-radius: 8px; margin: 8px 0; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-nav a { color: #e94560; text-decoration: none; font-weight: bold; }
        
        /* DIAGRAM BATANG */
        .bar-container { margin: 10px 0; background: #1a1a2e; padding: 10px; border-radius: 8px; }
        .bar-row { margin: 8px 0; }
        .bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
        .bar-outer { background: #333; height: 12px; border-radius: 6px; overflow: hidden; }
        .bar-inner { height: 100%; background: #00b894; width: 0; transition: width 0.8s ease; }
        .bar-inner.correct { background: #e94560; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-nav">
            <h2>⚙️ Panel Admin</h2>
            <div><a href="index.html" style="color:#ff6b6b;">🚪 Keluar</a></div>
        </div>
        <p class="subtitle">Halo, <span id="adminName"></span>!</p>

        <div class="tabs">
            <div class="tab active" onclick="gantiTab('soal')">📝 Soal</div>
            <div class="tab" onclick="gantiTab('email')">📧 Email</div>
            <div class="tab" onclick="gantiTab('log')">📋 Log</div>
            <div class="tab" onclick="gantiTab('statistik')">📊 Statistik</div>
        </div>

        <div class="tab-content active" id="tabSoal">
            <div id="soalForm" style="display:none; background: #1a1a4e; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                <h3 id="formTitle">➕ Tambah Soal</h3>
                <input type="hidden" id="editIndex" value="-1" />
                <textarea id="pertanyaan" placeholder="Tulis pertanyaan..."></textarea>
                <input type="text" id="opsiA" placeholder="Opsi A" />
                <input type="text" id="opsiB" placeholder="Opsi B" />
                <input type="text" id="opsiC" placeholder="Opsi C" />
                <input type="text" id="opsiD" placeholder="Opsi D" />
                <select id="jawabanBenar">
                    <option value="">❌ Tidak ada (Survei)</option>
                    <option value="A">✅ Jawaban: A</option>
                    <option value="B">✅ Jawaban: B</option>
                    <option value="C">✅ Jawaban: C</option>
                    <option value="D">✅ Jawaban: D</option>
                </select>
                <button class="btn-green" onclick="simpanSoal()">💾 Simpan Soal</button>
                <button class="btn-outline" onclick="batalForm()">❌ Batal</button>
            </div>
            <button class="btn-red" id="btnTambah" onclick="tampilForm()">➕ Tambah Soal Baru</button>
            <div id="daftarSoal"></div>
        </div>

        <div class="tab-content" id="tabEmail">
            <div style="display:flex;gap:5px;">
                <input type="email" id="inputEmailBaru" placeholder="Masukkan email baru..." />
                <button class="btn-green" onclick="tambahEmail()">➕ Tambah</button>
            </div>
            <div id="daftarEmail"></div>
        </div>

        <div class="tab-content" id="tabLog">
            <div id="daftarLogGagal"></div>
        </div>

        <div class="tab-content" id="tabStatistik">
            <div style="display:flex;gap:10px;margin-bottom:15px;">
                <button class="btn-blue" onclick="renderStats()">🔄 Refresh</button>
                <button class="btn-red" onclick="resetHasil()">🗑️ Reset</button>
            </div>
            <div id="summaryStats" class="card" style="text-align:center;"></div>
            <div id="detailPerSoal"></div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('userRole') !== 'admin') { window.location.href = 'index.html'; }
        document.getElementById('adminName').textContent = localStorage.getItem('userName') || 'Admin';

        function gantiTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            const map = {soal:1, email:2, log:3, statistik:4};
            document.querySelector(`.tab:nth-child(${map[tab]})`).classList.add('active');
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            if(tab === 'soal') renderSoal();
            if(tab === 'email') renderEmail();
            if(tab === 'log') renderLog();
            if(tab === 'statistik') renderStats();
        }

        function getSoal() { return JSON.parse(localStorage.getItem('soalKuis') || '[]'); }

        function renderSoal() {
            const soal = getSoal();
            const el = document.getElementById('daftarSoal');
            if(soal.length === 0) { el.innerHTML = '<p style="text-align:center; padding:20px;">Belum ada soal.</p>'; return; }
            el.innerHTML = soal.map((s, i) => `
                <div class="card">
                    <p><strong>#${i+1}</strong> ${s.pertanyaan}</p>
                    <button class="btn-blue" style="padding:5px 10px;" onclick="tampilForm(${i})">✏️ Edit</button>
                    <button class="btn-red" style="padding:5px 10px;" onclick="hapusSoal(${i})">🗑️ Hapus</button>
                </div>
            `).join('');
        }

        function tampilForm(idx = -1) {
            document.getElementById('soalForm').style.display = 'block';
            document.getElementById('btnTambah').style.display = 'none';
            document.getElementById('editIndex').value = idx;
            if(idx !== -1) {
                const s = getSoal()[idx];
                document.getElementById('formTitle').textContent = '✏️ Edit Soal';
                document.getElementById('pertanyaan').value = s.pertanyaan;
                document.getElementById('opsiA').value = s.opsi.A;
                document.getElementById('opsiB').value = s.opsi.B;
                document.getElementById('opsiC').value = s.opsi.C;
                document.getElementById('opsiD').value = s.opsi.D;
                document.getElementById('jawabanBenar').value = s.jawaban;
            } else {
                document.getElementById('formTitle').textContent = '➕ Tambah Soal';
                document.getElementById('pertanyaan').value = '';
                document.getElementById('opsiA').value = '';
                document.getElementById('opsiB').value = '';
                document.getElementById('opsiC').value = '';
                document.getElementById('opsiD').value = '';
                document.getElementById('jawabanBenar').value = '';
            }
        }

        function simpanSoal() {
            const p = document.getElementById('pertanyaan').value;
            const a = document.getElementById('opsiA').value;
            if(!p || !a) return alert('Minimal pertanyaan dan opsi A diisi!');

            const soal = getSoal();
            const idx = parseInt(document.getElementById('editIndex').value);
            const data = {
                pertanyaan: p,
                opsi: { A: a, B: document.getElementById('opsiB').value, C: document.getElementById('opsiC').value, D: document.getElementById('opsiD').value },
                jawaban: document.getElementById('jawabanBenar').value
            };

            if(idx === -1) { soal.push(data); } else { soal[idx] = data; }
            localStorage.setItem('soalKuis', JSON.stringify(soal));
            alert('Berhasil disimpan!');
            batalForm(); renderSoal();
        }

        function batalForm() {
            document.getElementById('soalForm').style.display = 'none';
            document.getElementById('btnTambah').style.display = 'block';
        }

        function hapusSoal(i) { if(confirm('Hapus soal ini?')) { const s = getSoal(); s.splice(i,1); localStorage.setItem('soalKuis', JSON.stringify(s)); renderSoal(); } }

        function renderEmail() {
            const e = JSON.parse(localStorage.getItem('emailAdminDisetujui') || '[]');
            document.getElementById('daftarEmail').innerHTML = e.map(m => `<div class="email-item"><span>${m}</span><button class="btn-red" style="padding:5px;" onclick="hapusEmail('${m}')">🗑️</button></div>`).join('');
        }
        function tambahEmail() {
            const input = document.getElementById('inputEmailBaru');
            if(!input.value) return;
            const e = JSON.parse(localStorage.getItem('emailAdminDisetujui') || '[]');
            e.push(input.value.toLowerCase());
            localStorage.setItem('emailAdminDisetujui', JSON.stringify(e)); 
            input.value = ''; renderEmail();
        }
        function hapusEmail(m) {
            const e = JSON.parse(localStorage.getItem('emailAdminDisetujui') || '[]').filter(x => x !== m);
            localStorage.setItem('emailAdminDisetujui', JSON.stringify(e)); renderEmail();
        }

        function renderLog() {
            const l = JSON.parse(localStorage.getItem('percobaanAdminGagal') || '[]');
            document.getElementById('daftarLogGagal').innerHTML = l.map(m => `<div class="card"><p><strong>${m.nama}</strong> (${m.email})</p><small>${m.waktu}</small></div>`).join('');
        }

        function renderStats() {
            const soal = getSoal();
            const hasil = JSON.parse(localStorage.getItem('hasilKuis') || '[]');
            const container = document.getElementById('detailPerSoal');
            const summary = document.getElementById('summaryStats');
            summary.innerHTML = `<h3>👥 Total Responden: ${hasil.length}</h3>`;
            if(hasil.length === 0) { container.innerHTML = '<p style="text-align:center;">Belum ada jawaban masuk.</p>'; return; }
            container.innerHTML = soal.map((s, i) => {
                const rekap = { A: 0, B: 0, C: 0, D: 0 };
                hasil.forEach(h => { if(h.jawaban[i]) rekap[h.jawaban[i]]++; });
                const buildBar = (label, key) => {
                    const count = rekap[key];
                    const percent = Math.round((count / hasil.length) * 100) || 0;
                    const isCorrect = s.jawaban === key;
                    return `
                        <div class="bar-row">
                            <div class="bar-label"><span>${label}. ${s.opsi[key]} ${isCorrect ? '✅' : ''}</span><span>${count} Orang (${percent}%)</span></div>
                            <div class="bar-outer"><div class="bar-inner ${isCorrect ? 'correct' : ''}" style="width: ${percent}%"></div></div>
                        </div>`;
                };
                return `<div class="card"><p><strong>#${i+1} ${s.pertanyaan}</strong></p><div class="bar-container">${buildBar('A', 'A')}${buildBar('B', 'B')}${buildBar('C', 'C')}${buildBar('D', 'D')}</div></div>`;
            }).join('');
        }

        function resetHasil() { if(confirm('Hapus semua hasil kuis?')) { localStorage.removeItem('hasilKuis'); renderStats(); } }

        renderSoal();
    </script>
</body>
</html>
