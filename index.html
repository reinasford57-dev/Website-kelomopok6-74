<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kuis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; min-height: 100vh;
        }
        .container {
            background: #16213e; padding: 40px 30px;
            border-radius: 20px; text-align: center; color: white;
            width: 90%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .btn {
            padding: 16px; border: none; border-radius: 12px;
            font-size: 17px; font-weight: bold; cursor: pointer; margin: 10px 0;
            width: 100%; text-transform: uppercase;
        }
        .btn-admin { background: #e94560; color: white; }
        .btn-client { background: #0f3460; color: white; }
        .nama-input {
            width: 100%; padding: 14px; margin: 15px 0;
            border-radius: 10px; background: #1a1a2e; color: white;
            border: 2px solid #333; text-align: center;
        }
        .popup-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .popup-overlay.active { display: flex; }
        .popup {
            background: #16213e; padding: 30px; border-radius: 20px;
            text-align: center; color: white; width: 85%; max-width: 380px;
        }
        .popup input {
            width: 100%; padding: 12px; border-radius: 8px;
            margin: 10px 0; background: #1a1a2e; border: 2px solid #444;
            color: white; text-align: center;
        }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #e94560; color: white; padding: 15px 30px;
            border-radius: 50px; font-weight: bold; z-index: 2000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Masuk Kuis</h2>
        <p style="color:#aaa;">Silakan pilih role</p>
        <input type="text" id="namaInput" class="nama-input" placeholder="Nama kamu..." />
        <button class="btn btn-admin" onclick="bukaPopupAdmin()">🔑 SAYA ADMIN</button>
        <button class="btn btn-client" onclick="masukClient()">👤 SAYA USER</button>
    </div>

    <div class="popup-overlay" id="popupAdmin">
        <div class="popup">
            <h3>🛡️ Verifikasi Admin</h3>
            <p>Masukkan email terdaftar</p>
            <input type="email" id="emailAdmin" placeholder="email@contoh.com" />
            <button class="btn btn-admin" onclick="verifikasiAdmin()">VERIFIKASI</button>
            <button class="btn" style="background:#333;" onclick="tutupPopup()">BATAL</button>
        </div>
    </div>

    <script>
        if (!localStorage.getItem('emailAdminDisetujui')) {
            localStorage.setItem('emailAdminDisetujui', JSON.stringify(['reinasford72@gmail.com']));
        }

        function showToast(pesan) {
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = pesan;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function bukaPopupAdmin() {
            if (!document.getElementById('namaInput').value.trim()) {
                return showToast('⚠️ Isi nama dulu!');
            }
            document.getElementById('popupAdmin').classList.add('active');
        }

        function tutupPopup() {
            document.getElementById('popupAdmin').classList.remove('active');
        }

        function verifikasiAdmin() {
            const nama = document.getElementById('namaInput').value.trim();
            const email = document.getElementById('emailAdmin').value.trim().toLowerCase();
            if (!email) return showToast('⚠️ Masukkan email!');

            const daftar = JSON.parse(localStorage.getItem('emailAdminDisetujui') || '[]');
            
            if (daftar.includes(email)) {
                localStorage.setItem('userRole', 'admin');
                localStorage.setItem('userName', nama);
                localStorage.setItem('userEmail', email);
                tutupPopup();
                showToast('✅ Admin! Mengalihkan...');
                setTimeout(() => {
                    // DI SINI HARUS Admin.html (A BESAR)
                    window.location.replace('Admin.html');
                }, 1000);
            } else {
                tutupPopup();
                localStorage.setItem('userRole', 'client');
                localStorage.setItem('userName', nama);
                showToast('😝 Bukan kelompok gw! Jadi client...');
                
                const gagal = JSON.parse(localStorage.getItem('percobaanAdminGagal') || '[]');
                gagal.push({ email, nama, waktu: new Date().toLocaleString() });
                localStorage.setItem('percobaanAdminGagal', JSON.stringify(gagal));
                
                setTimeout(() => {
                    window.location.replace('quiz.html');
                }, 1500);
            }
        }

        function masukClient() {
            const nama = document.getElementById('namaInput').value.trim();
            if (!nama) return showToast('⚠️ Isi nama dulu!');
            localStorage.setItem('userRole', 'client');
            localStorage.setItem('userName', nama);
            showToast('👋 Hai ' + nama + '!');
            window.location.replace('quiz.html');
        }
    </script>
</body>
</html>
